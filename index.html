# Upravený soubor `index.html`

```html
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}

h1 {
  text-align: center;
  background: #2a72d4;
  color: white;
  padding: 20px;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  font-size: 18px;
}

input[type="number"] {
  width: 70px;
  text-align: center;
}

/* NOVÁ POVINNÁ POLE PRO JMÉNO A TELEFON */
.form-group {
  margin-top: 20px;
}

.form-group label {
  display: block;
  font-weight: bold;
  margin-bottom: 6px;
  color: #2a72d4;
}

.form-group input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

#celkem,
#pocet {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
  color: #2a72d4;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 30px;
  font-size: 24px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #e85a28;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">
  <div id="items"></div>

  <div id="celkem">Celková cena: 0 Kč</div>
  <div id="pocet">Počet kusů: 0</div>

  <!-- NOVÁ POVINNÁ POLE PRO JMÉNO A TELEFON -->
  <div class="form-group">
    <label for="jmeno">VAŠE JMÉNO (zapisujte ve formátu Příjmení Jméno):</label>
    <input type="text" id="jmeno" placeholder="Novák Jan" required>
  </div>

  <div class="form-group">
    <label for="telefon">TELEFON:</label>
    <input type="tel" id="telefon" placeholder="+420 000 000 000" required>
  </div>

  <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>
</div>

<script>

let items = [];

// Načítání CSV
async function loadCSV() {
  try {
    const response = await fetch("data_bufet.csv?t=" + Date.now());

    if (!response.ok) {
      throw new Error("Soubor nebyl nalezen");
    }

    const text = await response.text();
    parseCSV(text);
    renderItems();

  } catch (err) {
    console.error(err);
    alert("Chyba načítání CSV.");
  }
}

// Parsování CSV
function parseCSV(text) {
  items = [];

  const lines = text.split("\n");

  // Přeskočí první řádek (hlavičku)
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();

    if (!line) continue;

    const [nazev, cena] = line.split(";");

    if (nazev && cena) {
      items.push({
        nazev: nazev.trim(),
        cena: parseFloat(cena.replace(",", ".")),
        mnozstvi: 0
      });
    }
  }
}

// Vykreslení položek
function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.nazev} (${item.cena} Kč)</span>
      <input
        type="number"
        min="0"
        value="0"
        onchange="updateItem(${index}, this.value)">
    `;

    container.appendChild(div);
  });
}

// Změna množství
function updateItem(index, value) {
  items[index].mnozstvi = parseInt(value) || 0;
  updateSummary();
}

// Přepočet souhrnu
function updateSummary() {
  let celkem = 0;
  let pocet = 0;

  items.forEach(item => {
    celkem += item.cena * item.mnozstvi;
    pocet += item.mnozstvi;
  });

  document.getElementById("celkem").innerText =
    "Celková cena: " + celkem.toFixed(2) + " Kč";

  document.getElementById("pocet").innerText =
    "Počet kusů: " + pocet;
}

// MAILTO FUNKCE PRO ODESLÁNÍ OBJEDNÁVKY E-MAILEM
function odeslatObjednavku() {

  // Načtení jména a telefonu
  const jmeno = document.getElementById("jmeno").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // Kontrola vyplnění jména
  if (jmeno === "") {
    alert("Vyplňte prosím své jméno.");
    document.getElementById("jmeno").focus();
    return;
  }

  // Kontrola vyplnění telefonu
  if (telefon === "") {
    alert("Vyplňte prosím telefon.");
    document.getElementById("telefon").focus();
    return;
  }

  // Vybrané položky
  const vybrane = items.filter(item => item.mnozstvi > 0);

  // Kontrola, zda je vybrána alespoň jedna položka
  if (vybrane.length === 0) {
    alert("Nevybral(a) jste žádné položky!");
    return;
  }

  // Výpočet souhrnu
  let celkem = 0;
  let pocet = 0;

  // Text jednotlivých položek
  const radky = vybrane.map(item => {
    const cenaPolozky = item.cena * item.mnozstvi;

    celkem += cenaPolozky;
    pocet += item.mnozstvi;

    return `${item.nazev} – ${item.mnozstvi} ks × ${item.cena.toFixed(2)} Kč = ${cenaPolozky.toFixed(2)} Kč`;
  });

  // Předmět e-mailu
  const subject = "Objednávka školního bufetu";

  // Tělo e-mailu
  const body =
    "Objednávka školního bufetu\n\n" +
    "Jméno zákazníka: " + jmeno + "\n" +
    "Telefon: " + telefon + "\n\n" +
    "Objednané položky:\n" +
    radky.join("\n") +
    "\n\n" +
    "Počet kusů celkem: " + pocet + "\n" +
    "Celková cena: " + celkem.toFixed(2) + " Kč";

  // MAILTO odkaz
  const mailto =
    "mailto:diatkova.veronika@kostka-skola.cz" +
    "?subject=" + encodeURIComponent(subject) +
    "&body=" + encodeURIComponent(body);

  // Otevření e-mailového klienta
  window.location.href = mailto;
}

// Start aplikace
loadCSV();

</script>

</body>
</html>
```
